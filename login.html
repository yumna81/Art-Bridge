<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - ArtBridge</title>
<link rel="icon" type="image/png" href="img/logo-artbridge.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/login.css">
<script src="js/auth.js"></script>
<script>redirectIfLoggedIn();</script>

<style id="mobile-responsive-patch">
.hamburger-btn{display:none;background:none;border:0;font-size:28px;cursor:pointer}
@media (max-width:430px){
  .hamburger-btn{display:block}
  .custom-navbar .nav-container{padding:0 .8rem!important}
  .custom-menu{
    display:none!important;position:absolute;top:56px;left:0;right:0;
    background:#fff;flex-direction:column;align-items:flex-start!important;
    padding:1rem;border-top:1px solid #ddd;gap:1rem!important;z-index:9999;
  }
  .custom-menu.mobile-open{display:flex!important}
  .custom-link,.custom-btn-dark,.custom-btn-outline{width:100%}
  img{max-width:100%;height:auto}
  .hero,.hero-content,.cards,.grid,.row,[class*="container"]{max-width:100%}
  body{overflow-x:hidden}
}
</style>
<script>
document.addEventListener('DOMContentLoaded',function(){
 const btn=document.querySelector('.hamburger-btn');
 const menu=document.querySelector('.custom-menu');
 if(btn&&menu){btn.onclick=()=>menu.classList.toggle('mobile-open');}
});
</script>
</head>
<body>

<header>
    <a href="index.html" class="brand">
      </a>
</header>

<!-- ============ LOGIN FORM ============ -->
<section class="auth-wrap">
  <div class="auth-card">
    <h1>Create Your Account</h1>
        <div class="auth-subtitle">Log in to your account</div>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Log In</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up here</a></p>
  </div>
</section>

<script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', function(event) {
        event.preventDefault();

        const email = document.getElementById('email').value.trim();
        const existingUser = getCurrentUser();

        // Keep the previously saved profile/portfolio if this email matches an earlier
        // signup/login on this browser, otherwise start a fresh basic profile.
        const user = (existingUser && existingUser.email === email) ? existingUser : {
            firstName: email.split('@')[0],
            fullName: email.split('@')[0],
            username: email.split('@')[0].toLowerCase(),
            email: email,
            role: 'Artist',
            bio: '',
            avatar: 'https://ui-avatars.com/api/?background=E9DFD2&color=4a4238&size=300&name=' + encodeURIComponent(email.split('@')[0])
        };

        setLoggedIn(user);
        alert('Login successful! Redirecting to Home...');
        window.location.href = "index.html";
    });
</script>
</body>
</html>
