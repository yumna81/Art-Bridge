<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Profile - ArtBridge</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/profile-artist.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-web shadow-sm sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold text-dark" href="#">ArtBridge</a>
            
            <div class="nav-search-box d-none d-md-flex align-items-center mx-4">
                <i class="bi bi-search text-muted me-2"></i>
                <input type="text" placeholder="Search artist, style, keyword..." class="form-control bg-transparent border-0 p-0">
            </div>

            <div class="ms-auto d-flex align-items-center gap-3">
                <a href="#" class="nav-link-item active">Home</a>
                <a href="#" class="nav-link-item">Explore</a>
                <a href="#" class="nav-link-item">Orders</a>
                <a href="#" class="nav-link-item position-relative">
                    <i class="bi bi-chat-dots fs-5"></i>
                    <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle"></span>
                </a>
                <div class="user-avatar-nav">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=80" alt="User">
                </div>
            </div>
        </div>
    </nav>

    <div class="container artist-web-wrapper py-5">
        
        <div class="profile-hero-section d-flex align-items-center justify-content-center mb-5">
            <div class="d-flex align-items-center gap-5 profile-header-block">
                <div class="avatar-holder">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=300" alt="ALinesLunar">
                </div>
                
                <div class="profile-info-text">
                    <div class="d-flex align-items-center gap-3 mb-2">
                        <h2 class="fw-bold m-0 text-dark">ALinesLunar</h2>
                        <span class="badge-artist-web">Sketch Artist</span>
                    </div>
                    <p class="text-muted small m-0 mb-2">@alineslunar • Digital & Sketch Enthusiast</p>
                    <p class="artist-bio-web text-secondary m-0 mb-3">
                        Creating visual worlds through smooth strokes and warm colors. Open for commissions and custom digital arts!
                    </p>

                    <div class="web-stat-inline d-flex gap-4 mb-3">
                        <div class="stat-cell-inline">
                            <strong>4.9</strong> <span class="text-muted small">Rating</span>
                        </div>
                        <div class="stat-cell-inline">
                            <strong id="followers-count">12.5K</strong> <span class="text-muted small">Followers</span>
                        </div>
                        <div class="stat-cell-inline">
                            <strong>90%</strong> <span class="text-muted small">Match</span>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button id="btn-follow" class="btn btn-follow-web px-4">Follow Artist</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="gallery-filter-bar d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold m-0 text-dark">Artworks Portfolio</h5>
            <div class="filter-pills-web">
                <button class="pill-web active" data-filter="all">All</button>
                <button class="pill-web" data-filter="digital">Digital</button>
                <button class="pill-web" data-filter="traditional">Traditional</button>
            </div>
        </div>

        <div class="web-gallery-grid">
            <div class="gallery-box" data-category="digital">
                <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=400" alt="Art 1">
            </div>
            <div class="gallery-box" data-category="traditional">
                <img src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?auto=format&fit=crop&q=80&w=400" alt="Art 2">
            </div>
            <div class="gallery-box" data-category="digital">
                <img src="https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&q=80&w=400" alt="Art 3">
            </div>
            <div class="gallery-box" data-category="traditional">
                <img src="https://images.unsplash.com/photo-1580136579312-94651dfd596d?auto=format&fit=crop&q=80&w=400" alt="Art 4">
            </div>
            <div class="gallery-box" data-category="digital">
                <img src="https://images.unsplash.com/photo-1579783928621-7a13d66a62d1?auto=format&fit=crop&q=80&w=400" alt="Art 5">
            </div>
            <div class="gallery-box" data-category="traditional">
                <img src="https://images.unsplash.com/photo-1605721911519-3dfeb3be25e7?auto=format&fit=crop&q=80&w=400" alt="Art 6">
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            // 1. LOGIC TOMBOL FOLLOW
            const followBtn = document.getElementById("btn-follow");
            let isFollowing = false;

            followBtn.addEventListener("click", function() {
                isFollowing = !isFollowing;
                if(isFollowing) {
                    followBtn.innerText = "Following";
                    followBtn.classList.add("following-active");
                } else {
                    followBtn.innerText = "Follow Artist";
                    followBtn.classList.remove("following-active");
                }
            });

            // 2. LOGIC FILTER KARYA
            const filterButtons = document.querySelectorAll(".pill-web");
            const galleryItems = document.querySelectorAll(".gallery-box");

            filterButtons.forEach(button => {
                button.addEventListener("click", function() {
                    filterButtons.forEach(btn => btn.classList.remove("active"));
                    this.classList.add("active");

                    const filterValue = this.getAttribute("data-filter");

                    galleryItems.forEach(item => {
                        if (filterValue === "all") {
                            item.style.display = "block";
                        } else {
                            if (item.getAttribute("data-category") === filterValue) {
                                item.style.display = "block";
                            } else {
                                item.style.display = "none";
                            }
                        }
                    });
                });
            });

        });
    </script>
</body>
</html>
