<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders - ArtBridge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/index.css">
<link rel="stylesheet" href="css/orders.css">
</head>
<body>

<div id="site-navbar"></div>

<header class="page-header">
  <div class="container">
    <span class="eyebrow">Track your orders</span>
    <h1>My Orders</h1>
    <p>All your commissions in one place, from in progress to done.</p>
  </div>
</header>

<section class="section">
  <div class="container">

    <div class="order-filters" id="orderFilters">
      <button class="order-filter-btn active" data-status="all">All</button>
      <button class="order-filter-btn" data-status="progress">In Progress</button>
      <button class="order-filter-btn" data-status="revision">Revision</button>
      <button class="order-filter-btn" data-status="cancelled">Cancelled</button>
      <button class="order-filter-btn" data-status="done">Done</button>
    </div>

    <div class="order-list" id="orderList"></div>

    <div class="empty-state" id="orderEmpty" style="display:none;">
      <div class="icon"></div>
      <h3>No orders here yet</h3>
      <p>Orders you place with an artist will show up in this tab.</p>
      <a href="search.html" class="btn btn-primary" style="margin-top:1rem;">Find an Artist</a>
    </div>

  </div>
</section>

<div id="site-footer"></div>

<script src="js/partials.js"></script>
<script src="js/artists-data.js"></script>
<script src="js/orders-data.js"></script>
<script>
  renderNavbar('orders');
  renderFooter();

  const list = document.getElementById('orderList');
  const empty = document.getElementById('orderEmpty');
  let activeStatus = 'all';

  function renderOrders() {
    const orders = getAllOrders().filter(o => activeStatus === 'all' || o.status === activeStatus);
    if (orders.length) {
      list.style.display = 'flex';
      empty.style.display = 'none';
      list.innerHTML = orders.map(renderOrderCard).join('');
    } else {
      list.style.display = 'none';
      empty.style.display = 'block';
    }
  }

  document.getElementById('orderFilters').addEventListener('click', function (e) {
    const btn = e.target.closest('.order-filter-btn');
    if (!btn) return;
    document.querySelectorAll('.order-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeStatus = btn.dataset.status;
    renderOrders();
  });

  renderOrders();
</script>
</body>
</html>
