<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - ArtBridge</title>
<link rel="icon" type="image/png" href="img/logo-artbridge.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/signup.css">
<script src="js/auth.js"></script>
<script>redirectIfLoggedIn();</script>

<style id="mobile-responsive-patch">
.hamburger-btn{display:none;background:none;border:0;font-size:28px;cursor:pointer}
@media (max-width:430px){
  .hamburger-btn{display:block}
  .custom-navbar .nav-container{padding:0 .8rem!important}
  .custom-menu{
    display:none!important;position:absolute;top:56px;left:0;right:0;
    background:#fff;flex-direction:column;align-items:flex-start!important;
    padding:1rem;border-top:1px solid #ddd;gap:1rem!important;z-index:9999;
  }
  .custom-menu.mobile-open{display:flex!important}
  .custom-link,.custom-btn-dark,.custom-btn-outline{width:100%}
  img{max-width:100%;height:auto}
  .hero,.hero-content,.cards,.grid,.row,[class*="container"]{max-width:100%}
  body{overflow-x:hidden}
}
</style>
<script>
document.addEventListener('DOMContentLoaded',function(){
 const btn=document.querySelector('.hamburger-btn');
 const menu=document.querySelector('.custom-menu');
 if(btn&&menu){btn.onclick=()=>menu.classList.toggle('mobile-open');}
});
</script>
</head>
<body>

<header>
  <div class="container">
    <a href="index.html" class="brand">
    </a>
  </div>
</header>

<!-- ============ SIGNUP FORM ============ -->
<section class="auth-wrap">
  <div class="auth-card">
    <h1>Create Your Account</h1>
    <p class="auth-subtitle">Join ArtBridge and find work you love</p>

    <form id="signupForm" action="#" method="POST">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" placeholder="Your first name" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" placeholder="Your last name" required>
        </div>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your email address" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="check-emails">
        <label for="check-emails">Send me helpful emails about rewarding work and job leads.</label>
      </div>
      <div class="checkbox-group">
        <input type="checkbox" id="check-terms" required>
        <label for="check-terms">Yes, I understand and agree to the ArtBridge Terms of Service, including the User Agreement and Privacy Policy.</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create My Account</button>
    </form>
     <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</section>

<script>
        const signupForm = document.getElementById('signupForm');

        signupForm.addEventListener('submit', function(event) {
            event.preventDefault();

            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const fullName = (firstName + ' ' + lastName).trim();

            const user = {
                firstName: firstName,
                lastName: lastName,
                fullName: fullName,
                username: email.split('@')[0].toLowerCase(),
                email: email,
                role: '',
                bio: '',
                avatar: 'https://ui-avatars.com/api/?background=E9DFD2&color=4a4238&size=300&name=' + encodeURIComponent(fullName || 'New Artist')
            };

            // Brand new account: start with a completely empty portfolio.
            localStorage.setItem('artbridge_portfolio', JSON.stringify([]));
            setLoggedIn(user);

            alert('Account created successfully! Redirecting to Home...');
            window.location.href = "index.html";
        });
</script>

</body>
</html>
